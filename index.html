<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karaplay</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="dash-mode">

    <!-- [LAYER 1] TOOLS BACKGROUND -->
    <div id="tools-layer">
        
        <!-- Lyrics Panel -->
        <div id="panel-lyrics" class="tool-panel">
            <div id="lyrics-container">
                <div id="lyrics-content">Loading lyrics...</div>
            </div>
            <div class="tool-controls">
                <button onclick="changeScrollSpeed(-25)" class="speed-btn">+</button>
                <div class="speed-label"><span id="speed-indicator">150ms</span></div>
                <button onclick="changeScrollSpeed(25)" class="speed-btn">-</button>
            </div>
        </div>

        <!-- Search / Media Manager Panel -->
        <div id="panel-media" class="tool-panel">
            <h2 class="panel-title">Media Manager</h2>
            <input type="search" id="search-input" placeholder="Search song or artist..." autocomplete="off" style="user-select:text !important; pointer-events:auto !important;">
            <div class="panel-split">
                <div id="search-results"></div>
                <div id="queue-side">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-weight:bold; color:var(--accent-color);">UP NEXT</span>
                        <button onclick="clearQueue()" class="mini-btn">CLEAR</button>
                    </div>
                    <div id="queue-list"></div>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="panel-settings" class="tool-panel">
            <h2 class="panel-title">Settings</h2>
            <div class="setting-group">
                <label>YouTube API Key</label>
                <div style="display:flex; gap:10px;">
                    <input type="password" id="settings-api-key" placeholder="Paste key here..." style="flex:1; user-select:text !important; pointer-events:auto !important;">
                    <button onclick="toggleApiKeyVisibility()" class="mini-btn">👁️</button>
                </div>
                <div id="test-result"></div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="testApiKey()" style="flex:1;" class="mini-btn">TEST</button>
                    <button onclick="saveApiKey()" style="flex:1;" class="gold-btn">SAVE & RELOAD</button>
                </div>
            </div>
            <hr>
            <div class="setting-row">
                <span>Driver Side</span>
                <button id="btn-orientation" onclick="toggleOrientation()" class="gold-btn">LEFT (LHD)</button>
            </div>
        </div>

        <!-- Manual Panel -->
        <div id="panel-manual" class="tool-panel">
            <h2 class="panel-title">User Manual</h2>
            <div id="readme-content" style="flex:1; overflow-y:auto; padding-right:10px; font-size:1.1rem; line-height:1.5; color:rgba(255,255,255,0.8);">
                Click the book icon to load the manual.
            </div>
        </div>

    </div>

    <!-- [LAYER 2] Background Video Player -->
    <div id="player-container">
        <div id="player"></div>
    </div>

    <!-- Shadow Player (Hidden) -->
    <div id="shadow-player-container" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;">
        <div id="shadow-player"></div>
    </div>

    <!-- [LAYER 3] Main UI Layer -->
    <div id="ui-layer">
 
        <!-- Version Tag -->
        <div id="version-tag">v3.3.4 (2026-04-02 22:05 HST)</div>
        
        <!-- Sidebar -->
        <div id="sidebar">
            <div id="sidebar-top">
                <div class="side-btn" id="btn-media-toggle" onclick="togglePanel('media')" title="Search">&#127911;</div>
                <div class="side-btn" id="btn-lyrics-toggle" onclick="togglePanel('lyrics')" title="Lyrics" style="margin-top:20px;">🎤</div>
                <div class="side-btn" id="btn-manual-toggle" onclick="togglePanel('manual')" title="Manual" style="margin-top:20px;">📖</div>
            </div>
            <div id="sidebar-bottom">
                <div class="side-btn" id="btn-settings-toggle" onclick="togglePanel('settings')" title="Settings">&#9881;</div>
                <div id="playback-cluster">
                    <div class="side-btn" onclick="prevTrack()">&#9198;</div>
                    <div class="side-btn" id="sidebar-btn-play" onclick="togglePlay()">&#9654;</div>
                    <div class="side-btn" onclick="nextTrack()">&#9197;</div>
                </div>
            </div>
        </div>

        <!-- Sliding Content Wrapper -->
        <div id="content-wrapper">
            <!-- Dashboard Info -->
            <div id="dashboard">
                <div id="clock">00:00 AM</div>
                <div id="weather">--°F</div>
            </div>

            <!-- Integrated Setup Widget -->
            <div id="setup-widget" style="display:none; pointer-events:auto !important;">
                <div class="setup-card">
                    <div class="setup-info">
                        <h2>API Key Required</h2>
                        <input type="password" id="setup-key-input" placeholder="Paste AIza... key" style="user-select:text !important; pointer-events:auto !important;">
                        <button onclick="saveSetupKey()" class="gold-btn">SAVE & START</button>
                    </div>
                    <div class="setup-qr">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://spataray.github.io/karaplay/setup.html">
                        <b>SCAN TO SETUP</b>
                    </div>
                </div>
            </div>

            <!-- UP NEXT TOAST - Pinned Right, Lowered -->
            <div id="up-next-toast">
                <div id="toast-label">UP NEXT</div>
                <div id="toast-title">Song Title</div>
            </div>

            <!-- Bottom Media Bar -->
            <div id="media-bar">
                <div id="track-info">
                    <div id="track-title">Ready to Play</div>
                    <div id="track-author">Select a song to start</div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js?v=3.2.8"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
