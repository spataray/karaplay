<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karaplay</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <!-- [LAYER 1] Lyrics Background -->
    <div id="lyrics-bg-layer">
        <div id="lyrics-container">
            <div id="lyrics-content">Loading lyrics...</div>
        </div>
        <div id="lyrics-speed-controls">
            <button onclick="changeScrollSpeed(-25)" class="speed-btn">+</button>
            <div class="speed-label">
                <span id="speed-indicator">150ms</span>
            </div>
            <button onclick="changeScrollSpeed(25)" class="speed-btn">-</button>
        </div>
    </div>

    <!-- [LAYER 2] Video Player -->
    <div id="player-container">
        <div id="player"></div>
    </div>

    <!-- Shadow Player -->
    <div id="shadow-player-container" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;">
        <div id="shadow-player"></div>
    </div>

    <!-- [LAYER 3] Main UI Layer -->
    <div id="ui-layer">
 
        <!-- Version Tag -->
        <div id="version-tag">v2.9.3 (2026-03-28 19:00 HST)</div>
        
        <!-- Sidebar (Fixed) -->
        <div id="sidebar">
            <div id="sidebar-top">
                <div class="side-btn" onclick="openOverlay('overlay-media')" title="Media Manager">&#127911;</div>
                <div class="side-btn" id="btn-lyrics-toggle" onclick="toggleLyrics()" title="Lyrics" style="margin-top:20px;">🎤</div>
            </div>
            <div id="sidebar-bottom">
                <div class="side-btn" onclick="openOverlay('overlay-settings')" title="Settings">&#9881;</div>
                <div id="playback-cluster">
                    <div class="side-btn" onclick="prevTrack()">&#9198;</div>
                    <div class="side-btn" id="sidebar-btn-play" onclick="togglePlay()">&#9654;</div>
                    <div class="side-btn" onclick="nextTrack()">&#9197;</div>
                </div>
            </div>
        </div>

        <!-- Sliding Wrapper -->
        <div id="content-wrapper">
            <div id="dashboard">
                <div id="clock">00:00 AM</div>
                <div id="weather">--°F</div>
            </div>

            <div id="up-next-toast">
                <div id="toast-label">UP NEXT</div>
                <div id="toast-title">Song Title</div>
            </div>

            <div id="media-bar">
                <div id="track-info">
                    <div id="track-title">Ready to Play</div>
                    <div id="track-author">Search for a song to start radio</div>
                </div>
            </div>
        </div>

    </div>

    <!-- Media Manager Overlay -->
    <div id="overlay-media" class="overlay">
        <div class="close-btn" onclick="closeAllOverlays()">&#x2715;</div>
        <div style="width:100%; max-width:1200px; display:flex; flex-direction:column; height:100%;">
            <input type="search" id="search-input" placeholder="Search song or artist..." autocomplete="off">
            <div style="display:flex; gap:30px; flex:1; overflow:hidden;">
                <div id="search-results" style="flex:1; overflow-y:auto;"></div>
                <div id="queue-container" style="flex:1; border-left: 2px solid #333; padding-left:30px; overflow-y:auto;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h2 style="font-size:1.8rem; margin:0; color:var(--accent-color);">Up Next</h2>
                        <button onclick="clearQueue()" style="background:#442222; color:#ff8888; border:1px solid #663333; padding:10px 20px; border-radius:10px; cursor:pointer;">CLEAR</button>
                    </div>
                    <div id="queue-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Overlay (Full Fix) -->
    <div id="overlay-settings" class="overlay">
        <div class="close-btn" onclick="closeAllOverlays()">&#x2715;</div>
        <h1 style="font-size:3rem; margin-bottom:20px; color:var(--accent-color);">Settings</h1>
        <div style="width:100%; max-width:600px; display:flex; flex-direction:column; gap:20px;">
            
            <div style="display:flex; flex-direction:column; gap:10px;">
                <label style="font-size:1.2rem; opacity:0.7;">YouTube API Key</label>
                <div style="display:flex; gap:10px;">
                    <input type="password" id="settings-api-key" placeholder="Paste API Key here..." style="flex:1; background:#222; border:2px solid #444; color:white; padding:15px; border-radius:10px; font-size:1.2rem;">
                    <button onclick="toggleApiKeyVisibility()" style="background:#333; color:white; border:none; padding:15px; border-radius:10px; font-size:1.5rem; cursor:pointer;">👁️</button>
                </div>
                <div id="test-result" style="font-size:1rem; text-align:center; min-height:1.2rem;"></div>
                <div style="display:flex; gap:10px;">
                    <button onclick="testApiKey()" style="flex:1; background:#444; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; font-size:1.1rem; cursor:pointer;">TEST KEY</button>
                    <button onclick="saveApiKey()" style="flex:1; background:var(--accent-color); color:black; border:none; padding:15px; border-radius:10px; font-weight:bold; font-size:1.1rem; cursor:pointer;">SAVE & RELOAD</button>
                </div>
            </div>

            <hr style="width:100%; border:0; border-top:1px solid #333; margin:10px 0;">

            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:1.5rem;">Driver Orientation</span>
                <button id="btn-orientation" onclick="toggleOrientation()" style="background:#333; color:white; border:none; padding:15px 30px; border-radius:10px; font-size:1.2rem; width:220px; cursor:pointer;">LEFT (LHD)</button>
            </div>
        </div>
    </div>

    <!-- API Key Setup Overlay -->
    <div id="overlay-setup" class="overlay active" style="display:none; flex-direction:row; padding:40px; gap:40px;">
        <div style="flex:1; text-align:left;">
            <h1 style="font-size:3rem; color:var(--accent-color);">API Key Required</h1>
            <p style="font-size:1.5rem; margin:20px 0;">Paste your YouTube API Key below. It stays private to your car.</p>
            <input type="password" id="setup-key-input" style="width:100%; padding:20px; font-size:1.5rem; border-radius:10px; border:none; background:#222; color:white; margin-bottom:20px;">
            <button onclick="saveSetupKey()" style="background:var(--accent-color); color:black; border:none; padding:20px 40px; border-radius:10px; font-size:1.5rem; font-weight:bold; cursor:pointer; width:100%;">SAVE & START</button>
        </div>
        <div style="width:300px; background:white; padding:20px; border-radius:20px; color:black; text-align:center;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://console.cloud.google.com/flows/enableapi?apiid=youtube.googleapis.com" style="width:200px; margin-bottom:15px;">
            <b style="font-size:1.2rem;">SCAN TO GET KEY</b>
        </div>
    </div>

    <script src="script.js?v=2.9.3"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
